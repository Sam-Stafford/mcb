<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Maidenhead Concert Band</title>
        <meta name="description" content="A vibrant community band for all ages in Maidenhead, performing at local events and charity concerts."/>
        <link rel="canonical" href="http://maidenheadconcertband.co.uk"/>
        <style>
            /* Basic Reset & Body Styles */
            body {
                margin: 0;
                background: #f8f8f8;
                color: #333333;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                font-size: 16px;
                line-height: 1.8;
                text-shadow: 0 1px 0 #ffffff;
            }
            /* Container for content */
            .container {
                max-width: 960px;
                margin: 0 auto;
                padding: 20px;
            }
            /* Header Styles */
            header {
                background-color: #0056b3;
                color: #ffffff;
                text-align: center;
                box-shadow: 0 2px 5px rgba(0,0,0,0.1);
                background-image: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.2)), url('images/banner.jpg');
                background-size: 80%; 
                background-position: center center; 
                background-repeat: no-repeat; 
                padding: 10px 0; 
            }
            header h1 {
                margin-top: 0; 
                margin-bottom: 10px; 
                font-size: 4em; 
            }
            header p {
                margin-top: 0;
                font-size: 1.6em; 
            }
            /* Navigation Styles */
            nav {
                background-color: #004085; /* Darker blue for nav */
                padding: 10px 0;
                text-align: center;
            }
            nav ul {
                list-style: none;
                padding: 0;
                margin: 0;
                display: flex; /* For horizontal navigation */
                justify-content: center;
            }
            nav ul li {
                margin: 0 15px;
            }
            nav ul li a {
                color: #ffffff;
                text-decoration: none;
                border-bottom: 2px solid transparent; /* For hover effect */
                transition: border-bottom 0.3s ease;
            }
            nav ul li a:hover {
                border-bottom: 2px solid #ffffff;
            }
            /* Section Styles */
            section {
                background-color: #ffffff;
                margin-bottom: 20px;
                padding: 30px;
                border-radius: 8px;
                box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            }
            section h2 {
                color: #0056b3;
                font-size: 2em;
                margin-top: 0;
                border-bottom: 2px solid #e0e0e0;
                padding-bottom: 10px;
                margin-bottom: 20px;
            }
            /* Link Styles */
            a {
                color: #0056b3;
                text-decoration: none;
                border-bottom: 1px solid #0056b3;
                transition: color 0.3s ease, border-bottom 0.3s ease;
            }
            a:hover {
                color: #004085;
                border-bottom: 1px solid #004085;
            }
            /* Footer Styles */
            footer {
                background-color: #333333;
                color: #ffffff;
                text-align: center;
                padding: 20px 0;
                font-size: 0.9em;
                margin-top: 40px;
            }
            footer p {
                margin: 0;
            }
            /* Utility Classes */
            .text-center {
                text-align: center;
            }
            /* Responsive Adjustments */
            @media (max-width: 768px) {
                .container {
                    padding: 15px;
                }
                header h1 {
                    font-size: 2em;
                }
                nav ul {
                    flex-direction: column; /* Stack nav items vertically on small screens */
                }
                nav ul li {
                    margin: 5px 0;
                }
            }
        </style>
    </head>
    <body>
        <header>
            <div class="container">
                <h1>Maidenhead Concert Band</h1>
                <p>A vibrant community band for all ages</p>
            </div>
        </header>

        <nav>
            <div class="container">
                <ul>
                    <li><a href="#home">Home</a></li>
                    <li><a href="#about">About Us</a></li>
                    <li><a href="#events">Events</a></li>
                    <li><a href="media.html">Media</a></li>
                    <li><a href="#join-us">Join Us</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </div>
        </nav>

        <main class="container">
            <section id="home">
                <!-- Content will be loaded from home.md here -->
                <div class="markdown-content" data-markdown-src="home.md"></div>
            </section>

            <section id="about">
                <!-- Content will be loaded from about.md here -->
                <div class="markdown-content" data-markdown-src="about.md"></div>
            </section>

            <section id="events">
                <!-- Content will be loaded from events.md here -->
                <div class="markdown-content" data-markdown-src="events.md"></div>
            </section>

            <section id="join-us">
                <!-- Content will be loaded from join-us.md here -->
                <div class="markdown-content" data-markdown-src="join-us.md"></div>
            </section>

            <section id="contact">
                <!-- Content will be loaded from contact.md here -->
                <div class="markdown-content" data-markdown-src="contact.md"></div>
            </section>
        </main>

        <footer>
            <div class="container">
                <p><strong>Copyright © 2026 Maidenhead Concert Band</strong>. The MCB is a local community group and does not profit from these activities.</p>
                <p>Designed with passion for the community.</p>
            </div>
        </footer>

        <!-- Include marked.js library -->
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <script>
            document.addEventListener('DOMContentLoaded', function() {
                const markdownContainers = document.querySelectorAll('.markdown-content');
                markdownContainers.forEach(container => {
                    const markdownSrc = container.dataset.markdownSrc;
                    if (markdownSrc) {
                        fetch(markdownSrc)
                            .then(response => {
                                if (!response.ok) {
                                    throw new Error(`HTTP error! status: ${response.status}`);
                                }
                                return response.text();
                            })
                            .then(markdownText => {
                                // Convert Markdown to HTML using marked.js
                                container.innerHTML = marked.parse(markdownText);
                            })
                            .catch(error => {
                                console.error(`Error loading Markdown from ${markdownSrc}:`, error);
                                container.innerHTML = `<p style="color: red;">Failed to load content from ${markdownSrc}. Please try again later.</p>`;
                            });
                    }
                });
            });
        </script>
    </body>
</html>
