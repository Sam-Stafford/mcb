<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Maidenhead Concert Band</title>
        <meta name="description" content="A vibrant community band for all ages in Maidenhead, performing at local events and charity concerts."/>
        <link rel="canonical" href="http://maidenheadconcertband.co.uk"/>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header>
            <div class="container">
                <h1>Maidenhead Concert Band</h1>
                <p>A vibrant community band for all ages</p>
            </div>
        </header>

        <nav>
            <div class="container">
                <ul>
                    <li><a href="#home">Home</a></li>
                    <li><a href="#about">About Us</a></li>
                    <li><a href="#events">Events</a></li>
                    <li><a href="media.html">Media</a></li>
                    <li><a href="#join-us">Join Us</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </div>
        </nav>

        <main class="container">
            <section id="home">
                <!-- Content will be loaded from home.md here -->
                <div class="markdown-content" data-markdown-src="home.md"></div>
            </section>

            <section id="about">
                <!-- Content will be loaded from about.md here -->
                <div class="markdown-content" data-markdown-src="about.md"></div>
            </section>

            <section id="events">
                <!-- Content will be loaded from events.md here -->
                <div class="markdown-content" data-markdown-src="events.md"></div>
            </section>

            <section id="join-us">
                <!-- Content will be loaded from join-us.md here -->
                <div class="markdown-content" data-markdown-src="join-us.md"></div>
            </section>

            <section id="contact">
                <!-- Content will be loaded from contact.md here -->
                <div class="markdown-content" data-markdown-src="contact.md"></div>
            </section>
        </main>

        <footer>
            <div class="container">
                <p><strong>Copyright © 2026 Maidenhead Concert Band</strong>. The MCB is a local community group and does not profit from these activities.</p>
                <p>Designed with passion for the community.</p>
            </div>
        </footer>

        <!-- Include marked.js library -->
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <script>
            document.addEventListener('DOMContentLoaded', function() {
                const markdownContainers = document.querySelectorAll('.markdown-content');
                markdownContainers.forEach(container => {
                    const markdownSrc = container.dataset.markdownSrc;
                    if (markdownSrc) {
                        fetch(markdownSrc)
                            .then(response => {
                                if (!response.ok) {
                                    throw new Error(`HTTP error! status: ${response.status}`);
                                }
                                return response.text();
                            })
                            .then(markdownText => {
                                // Convert Markdown to HTML using marked.js
                                container.innerHTML = marked.parse(markdownText);
                            })
                            .catch(error => {
                                console.error(`Error loading Markdown from ${markdownSrc}:`, error);
                                container.innerHTML = `<p style="color: red;">Failed to load content from ${markdownSrc}. Please try again later.</p>`;
                            });
                    }
                });
            });
        </script>
    </body>
</html>
